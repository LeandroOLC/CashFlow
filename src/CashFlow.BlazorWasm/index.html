<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CashFlow</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh">
            <div style="text-align:center">
                <svg style="width:48px;height:48px;margin:0 auto 16px;display:block;animation:spin 1s linear infinite"
                     viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="#1565C0" stroke-width="2" stroke-opacity="0.3" />
                    <path d="M12 2a10 10 0 0 1 10 10" stroke="#1565C0" stroke-width="2" stroke-linecap="round" />
                </svg>
                <style>
                    @keyframes spin {
                        to {
                            transform: rotate(360deg);
                        }
                    }
                </style>
                <p style="color:#666;font-family:Roboto,sans-serif;font-size:14px">Carregando CashFlow...</p>
            </div>
        </div>
    </div>

    <script src="_content/Blazored.LocalStorage/blazored-localstorage.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>
