server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── MIME types para Blazor WASM ───────────────────────────────────────────
    types {
        text/html                   html htm;
        text/css                    css;
        text/javascript             js;
        application/json            json;
        application/wasm            wasm;
        application/octet-stream    dll dat blat;
        font/woff                   woff;
        font/woff2                  woff2;
        image/svg+xml               svg;
        image/png                   png;
        image/jpeg                  jpg jpeg;
    }

    # ── Compressão ────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types        text/css text/javascript application/json
                      application/javascript application/wasm image/svg+xml;

    # ── SPA fallback — todas as rotas devolvem index.html ─────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── _framework — nunca cachear (blazor.boot.json muda a cada build) ───────
    location /_framework/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        try_files $uri =404;
    }

    # ── .wasm e .dll — cache longo (hash no nome garante imutabilidade) ───────
    location ~* \.(wasm|dll|dat|blat)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── appsettings.json — nunca cachear ──────────────────────────────────────
    location ~* appsettings.*\.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── index.html — nunca cachear ────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
    }

    # ── Segurança ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
