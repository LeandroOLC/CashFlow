worker_processes  1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── MIME types extras necessários para Blazor WASM ────────────────────────
    types {
        application/wasm                    wasm;
        application/octet-stream            dll dat blat;
        application/manifest+json           webmanifest;
    }

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # ── Compressão ────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen       80;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # ── SPA fallback — todas as rotas devolvem index.html ─────────────────
        # Obrigatório para o roteamento do Blazor funcionar (ex: /transactions)
        location / {
            try_files $uri $uri/ /index.html =404;
        }

        # ── Blazor framework — _framework/*.* ────────────────────────────────
        # blazor.webassembly.js, dotnet.*.js, blazor.boot.json etc.
        location /_framework/ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
            try_files $uri =404;
        }

        # ── Arquivos .wasm — cache longo (hash no nome garante imutabilidade) ─
        location ~* \.wasm$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Content-Type  "application/wasm";
            try_files $uri =404;
        }

        # ── DLLs e binários do runtime ────────────────────────────────────────
        location ~* \.(dll|dat|blat)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ── Conteúdo estático com hash (CSS, JS, fontes) ─────────────────────
        location ~* \.[0-9a-f]{8}\.(css|js|woff2?)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ── CSS e JS sem hash (MudBlazor, app.css) ───────────────────────────
        location ~* \.(css|js)$ {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

     

        # ── Segurança básica ──────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}